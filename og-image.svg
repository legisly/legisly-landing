<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Navy background -->
  <rect width="1200" height="630" fill="#1B365D"/>
  <!-- Subtle halftone dots -->
  <defs>
    <pattern id="dots" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="6" cy="6" r="1" fill="#0F2342" opacity="0.4"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <!-- Gold top and bottom borders -->
  <rect x="0" y="0" width="1200" height="8" fill="#F2C744"/>
  <rect x="0" y="622" width="1200" height="8" fill="#F2C744"/>
  <!-- Seal -->
  <g transform="translate(440, 60) scale(0.8)">
    <circle cx="100" cy="100" r="96" fill="none" stroke="#F2C744" stroke-width="4"/>
    <circle cx="100" cy="100" r="88" fill="none" stroke="#F2C744" stroke-width="1" stroke-dasharray="2 4"/>
    <circle cx="100" cy="100" r="82" fill="none" stroke="#F2C744" stroke-width="2"/>
    <g transform="translate(40, 30)">
      <path d="M60 20 C30 20 18 50 18 63 L102 63 C102 50 90 20 60 20Z" fill="none" stroke="#F2C744" stroke-width="2.5"/>
      <rect x="52" y="9" width="16" height="15" fill="none" stroke="#F2C744" stroke-width="2"/>
      <circle cx="60" cy="9" r="3" fill="#F2C744"/>
      <circle cx="42" cy="45" r="4" fill="#F2C744"/>
      <circle cx="60" cy="41" r="4" fill="#F2C744"/>
      <circle cx="78" cy="45" r="4" fill="#F2C744"/>
      <rect x="24" y="63" width="7" height="24" fill="#F2C744"/>
      <rect x="40" y="63" width="7" height="24" fill="#F2C744"/>
      <rect x="56" y="63" width="8" height="24" fill="#F2C744"/>
      <rect x="73" y="63" width="7" height="24" fill="#F2C744"/>
      <rect x="89" y="63" width="7" height="24" fill="#F2C744"/>
      <rect x="16" y="87" width="88" height="6" fill="#F2C744"/>
    </g>
    <g fill="#F2C744">
      <polygon points="28,100 30,105 35,105 31,108 32.5,113 28,110 23.5,113 25,108 21,105 26,105"/>
      <polygon points="172,100 174,105 179,105 175,108 176.5,113 172,110 167.5,113 169,108 165,105 170,105"/>
    </g>
    <text x="100" y="158" text-anchor="middle" fill="#F2C744" font-family="sans-serif" font-weight="bold" font-size="11" letter-spacing="2">EST 2025</text>
  </g>
  <!-- Wordmark -->
  <text x="600" y="370" text-anchor="middle" font-family="'Righteous', 'Georgia', serif" font-size="88" font-weight="400" fill="#F2C744" letter-spacing="4">legisly</text>
  <!-- Tagline -->
  <text x="600" y="430" text-anchor="middle" font-family="'Barlow Condensed', 'Arial Narrow', sans-serif" font-size="26" font-weight="600" fill="#F4A261" letter-spacing="4" text-transform="uppercase">YOUR UNFAIR ADVANTAGE IN POLICY</text>
  <!-- Decorative stars -->
  <text x="440" y="432" text-anchor="middle" font-size="20" fill="#F2C744">&#x2605;</text>
  <text x="760" y="432" text-anchor="middle" font-size="20" fill="#F2C744">&#x2605;</text>
  <!-- Bottom tagline -->
  <text x="600" y="560" text-anchor="middle" font-family="'Arial', sans-serif" font-size="18" fill="#FAF3E3" opacity="0.5" letter-spacing="3">AI-POWERED LEGISLATIVE INTELLIGENCE</text>
</svg>
